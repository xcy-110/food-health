<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>断舍离 - 物品去留建议助手</title>
  <meta name="description" content="AI驱动的断舍离建议工具，帮你判断物品该丢还是该留">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9986;</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Screen 1: Landing -->
  <section id="screen-landing" class="screen screen--active">
    <div class="landing-container">
      <div class="logo-area">
        <div class="logo-icon">&#9986;</div>
        <h1 class="logo-title">断舍离</h1>
        <p class="logo-subtitle">让 AI 帮你做决定</p>
      </div>
      <div class="input-area">
        <div class="item-input-wrapper">
          <input type="text" id="itemInput" placeholder="这件东西叫什么？" autocomplete="off">
          <button id="cameraBtn" type="button" class="camera-btn" title="拍照识别">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
          </button>
        </div>
        <div class="photo-preview" id="photoPreview">
          <img id="previewImage" src="" alt="预览">
          <button id="removePhotoBtn" type="button" class="remove-photo-btn" title="移除照片">&times;</button>
          <span class="photo-label">已添加照片</span>
        </div>
        <button id="startBtn" type="button" class="start-btn">开始评估</button>
      </div>
      <div class="examples">
        <span class="examples-label">试试看：</span>
        <button class="example-tag" type="button">旧皮包</button>
        <button class="example-tag" type="button">积灰玩具</button>
        <button class="example-tag" type="button">五年前的衣服</button>
        <button class="example-tag" type="button">过期杂志</button>
      </div>
    </div>
  </section>

  <!-- Screen 2: Identifying (photo AI recognition) -->
  <section id="screen-identifying" class="screen">
    <div class="identifying-container">
      <div class="spinner-ring"></div>
      <p class="status-text">AI 正在识别物品...</p>
    </div>
  </section>

  <!-- Screen 3: Questions -->
  <section id="screen-questions" class="screen">
    <div class="questions-container">
      <div class="item-chip" id="itemChip">
        <img id="chipImage" class="chip-image" src="" alt="">
        <span id="chipName" class="chip-name"></span>
      </div>
      <div class="progress-dots">
        <span class="dot dot--active" data-index="0"></span>
        <span class="dot" data-index="1"></span>
        <span class="dot" data-index="2"></span>
      </div>
      <div class="question-card" id="questionCard">
        <div class="question-number" id="questionNumber">问题 1/3</div>
        <div class="question-text" id="questionText"></div>
        <div class="answer-buttons">
          <button class="btn-answer btn-yes" type="button" id="btnYes">是的</button>
          <button class="btn-answer btn-no" type="button" id="btnNo">没有</button>
        </div>
      </div>
      <div class="answered-summary" id="answeredSummary"></div>
    </div>
  </section>

  <!-- Screen 4: Loading (AI generating advice) -->
  <section id="screen-loading" class="screen">
    <div class="loading-container">
      <div class="pulse-loader">
        <span></span><span></span><span></span>
      </div>
      <p class="status-text">AI 正在给出建议...</p>
    </div>
  </section>

  <!-- Screen 5: Result -->
  <section id="screen-result" class="screen">
    <div class="result-container">
      <div class="item-chip" id="resultItemChip">
        <img id="resultChipImage" class="chip-image" src="" alt="">
        <span id="resultChipName" class="chip-name"></span>
      </div>
      <div class="score-display">
        <svg class="score-ring" viewBox="0 0 160 160">
          <circle class="score-ring-bg" cx="80" cy="80" r="60"/>
          <circle class="score-ring-progress" id="scoreProgress" cx="80" cy="80" r="60"/>
        </svg>
        <div class="score-value" id="scoreValue">0</div>
        <div class="score-label">断舍离指数</div>
      </div>
      <div class="verdict-banner" id="verdictBanner">
        <span class="verdict-emoji" id="verdictEmoji"></span>
        <span class="verdict-title" id="verdictTitle"></span>
      </div>
      <div class="advice-card" id="adviceCard">
        <p id="adviceText"></p>
      </div>
      <div class="scenarios-card" id="scenariosCard">
        <h3 class="scenarios-title">这些场景你可能用得到</h3>
        <ul id="scenariosList"></ul>
      </div>
      <div class="action-buttons">
        <button id="restartBtn" type="button" class="restart-btn">重新评估</button>
      </div>
    </div>
  </section>

  <!-- Toast notification -->
  <div id="toast" class="toast"></div>

  <!-- Fallback warning bar -->
  <div id="fallbackWarning" class="fallback-warning">
    未配置 AI API，当前使用规则引擎提供基础建议
  </div>

  <!-- Hidden file input for camera -->
  <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none">

  <!-- Scripts -->
  <script src="config.js"></script>
  <script src="js/camera.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
